<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Kassam</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <h1>🚀 Mini App tayyorlanmoqda</h1>
        <p class="subtitle">
            Mini app ustida ishlayapmiz. Tez orada ishga tushadi.
        </p>
        <div class="loader"></div>
    </div>
    <script src="app.js"></script>
    <script>
        const texts = [
            "Tez orada ishga tushadi 🚀",
            "Mini app ustida ish davom etmoqda ⚡",
            "Yangi imkoniyatlar tayyorlanmoqda 🔥"
        ]

        let i = 0

        setInterval(() => {

            document.querySelector(".subtitle").innerText = texts[i]

            i++

            if (i >= texts.length) {

                i = 0

            }

        }, 3000)
    </script>
</body>

</html>
