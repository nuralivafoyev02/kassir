<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Kassam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loader.css">
</head>

<body>
    <div class="wrapper">
        <h1>Tez kunda!</h1>
        <p class="subtitle">
            Mini app ustida ishlayapmiz. Tez orada ishga tushadi.
        </p>
        <div class="gearbox">
            <div class="overlay"></div>
            <div class="gear one">
                <div class="gear-inner">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            <div class="gear two">
                <div class="gear-inner">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            <div class="gear three">
                <div class="gear-inner">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            <div class="gear four large">
                <div class="gear-inner">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        const texts = [
            "Tez orada ishga tushadi 🚀",
            "Mini app ustida ish davom etmoqda ⚡",
            "Yangi imkoniyatlar tayyorlanmoqda 🔥"
        ]
        const subtitle = document.querySelector(".subtitle")
        let i = 0
        function changeText() {
            subtitle.classList.remove("show")
            setTimeout(() => {
                subtitle.innerText = texts[i]
                subtitle.classList.add("show")
                i++
                if (i >= texts.length) {
                    i = 0
                }
            }, 300)
        }
        subtitle.classList.add("show")
        setInterval(changeText, 3000)
    </script>
</body>

</html>
